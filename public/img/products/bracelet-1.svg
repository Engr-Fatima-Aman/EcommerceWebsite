    <ellipse cx="300" cy="300" rx="200" ry="120"
             fill="none" stroke="#eef0f3" stroke-width="2"/>
    <g fill="#ffffff" stroke="url(#brac-metal)" stroke-width="2">
      <circle cx="100" cy="300" r="10"/>
