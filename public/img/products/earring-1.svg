<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">

    
    <defs>
      <radialGradient id="ear-bg" cx="50%" cy="40%" r="70%">
        <stop offset="0%"  stop-color="#eef0f3"/>
        <stop offset="100%" stop-color="#cfd8e3"/>
      </radialGradient>
      <linearGradient id="ear-metal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#9aa6b5"/>
        <stop offset="50%"  stop-color="#3d4a5c"/>
        <stop offset="100%" stop-color="#9aa6b5"/>
      </linearGradient>
    </defs>
    <rect width="600" height="600" fill="url(#ear-bg)"/>
    <g transform="translate(220 200)">
      <circle r="22" fill="none" stroke="url(#ear-metal)" stroke-width="6"/>
      <line x1="0" y1="22" x2="0" y2="60" stroke="url(#ear-metal)" stroke-width="4"/>
      <polygon points="0,60 -22,100 0,150 22,100" fill="#ffffff" stroke="url(#ear-metal)" stroke-width="3"/>
    </g>
    <g transform="translate(380 200)">
      <circle r="22" fill="none" stroke="url(#ear-metal)" stroke-width="6"/>
      <line x1="0" y1="22" x2="0" y2="60" stroke="url(#ear-metal)" stroke-width="4"/>
      <polygon points="0,60 -22,100 0,150 22,100" fill="#ffffff" stroke="url(#ear-metal)" stroke-width="3"/>
    </g>
</svg>