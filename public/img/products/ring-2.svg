        <stop offset="0%"  stop-color="#eef0f3"/>
        <stop offset="100%" stop-color="#cfd8e3"/>
      </radialGradient>
      <linearGradient id="ring-metal" x1="0%" y1="0%" x2="100%" y2="100%">
